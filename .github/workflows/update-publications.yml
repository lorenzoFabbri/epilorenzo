name: Update Publication Pages

# Runs weekly and whenever publications.yml is changed.
# Fetches fresh metadata from CrossRef / DataCite, regenerates all
# research/articles/*/index.qmd and research/posters/*/index.qmd,
# then commits any changes back to the repo.

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  push:
    paths:
      - "publications.yml"
      - "scripts/generate_publications.py"
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write          # Needed to push the generated files back

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write permission so the commit can trigger other workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate publication pages
        run: python scripts/generate_publications.py --discover

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet research/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/
          git commit -m "chore: auto-update publication pages from CrossRef/DataCite"
          git push
