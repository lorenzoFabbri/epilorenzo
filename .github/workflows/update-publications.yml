name: Update Publication Pages

# Runs weekly and whenever publications.yml is changed.
# Discovers new ORCID publications (via orcidtr), appends them to
# publications.yml, regenerates all research pages, commits changes,
# and opens a GitHub Issue if new papers were added.

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  push:
    paths:
      - "publications.yml"
      - "scripts/generate_publications.py"
      - "scripts/discover_publications.R"
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      RENV_CONFIG_AUTOLOADER_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Install R dependencies for discovery
        run: |
          install.packages(c("orcidtr", "yaml", "data.table", "here"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Discover new ORCID publications
        run: Rscript scripts/discover_publications.R

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate publication pages
        run: python scripts/generate_publications.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet -- research/ publications.yml || echo "changed=true" >> "$GITHUB_OUTPUT"
          if [ -f _new_publications.md ]; then
            echo "new_pubs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/ publications.yml
          git commit -m "chore: auto-update publication pages from ORCID/CrossRef"
          git push

      - name: Open GitHub Issue for new publications
        if: steps.diff.outputs.new_pubs == 'true'
        run: |
          BODY=$(cat _new_publications.md)
          gh issue create \
            --title "New publications discovered from ORCID" \
            --body "The following publications were automatically added from your ORCID profile. Please add categories and links:

          ${BODY}

          Edit \`publications.yml\` to add \`categories\`, \`github\`, and \`extra_links\` for each entry." \
            --label "publications"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
